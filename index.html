<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reproductor PGN Mejorado</title>

<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<style>
#boardContainer{
  position: relative;
  width: 400px;
  height: 400px;
}

#board{
  width: 100%;
  height: 100%;
}

#gameOverlay{
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  color: red;
  font-size: 32px;
  font-weight: bold;
  pointer-events: none;
}

.arrow{
  position: absolute;
  height: 4px;
  transform-origin: 0 0;
  pointer-events: none;
}

.arrowHead{
  position: absolute;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-bottom: 14px solid;
  pointer-events: none;
}

.circle{
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  box-sizing: border-box;
  border-width: 4px;
}

#movesBox{
  width: 400px;
  height: 80px;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>
<body>

<div id="boardContainer">
  <div id="board"></div>
  <div id="gameOverlay"></div>
</div>

<br>
<button id="prevBtn">Previous</button>
<button id="nextBtn">Next</button>
<button id="prevGameBtn">Previous Partida</button>
<button id="nextGameBtn">Siguiente Partida</button>

<br><br>
<div id="movesBox"></div>

<script>
const rawPGN=`
1. e3 d5 { [%csl Ga6,Bb6,Rc6,Yd6,Gh6,Bg6,Rf6,Ye6][%cal Gb2b4,Bc2c4,Rd2d4,Ya2a4,Ge2f4,Bf2e4,Rg2g4,Yh2h4] }
2. Nf3 Nc6
3. Bc4 f6
(3... g5 4. g3 f6 5. h3 h6 6. Rg1)
4. g3 g6
5. g4 g5 *
`;

function splitPGNVariants(pgn){
  const variants=[]; let mainPGN=pgn;
  const regex=/\(([^()]+)\)/g; let match;
  while((match=regex.exec(pgn))!==null){
    let v=match[1].trim();
    const startsBlack=/^\d+\.\.\./.test(v);
    let firstWhiteMove=pgn.match(/1\.\s*([^\s]+)/)[1];
    v=v.replace(/\d+\.\.\./g,'').replace(/\d+\./g,'').replace(/\s+/g,' ').trim();
    const tokens=v.split(' '); let san="";
    if(startsBlack){ san+="1. "+firstWhiteMove+" "+tokens[0]+" "; let n=2,i=1;
      while(i<tokens.length){ san+=n+". "+tokens[i]+" "; if(tokens[i+1])san+=tokens[i+1]+" "; n++; i+=2; }
    }else{ let n=1; for(let i=0;i<tokens.length;i+=2){ san+=n+". "+tokens[i]+" "; if(tokens[i+1])san+=tokens[i+1]+" "; n++; } }
    variants.push(san.trim()); mainPGN=mainPGN.replace(match[0],'').trim();
  }
  return [mainPGN,...variants];
}

function extractAnnotations(pgn){
  const arrowMap={G:"green",R:"red",B:"blue",Y:"yellow"};
  const annotations={}; let moveIndex=0;
  const regex=/\{([^}]+)\}/g; let match;
  while((match=regex.exec(pgn))!==null){
    const text=match[1]; annotations[moveIndex]={arrows:[],circles:[]};
    const cal=text.match(/\[%cal ([^\]]+)\]/); const csl=text.match(/\[%csl ([^\]]+)\]/);
    if(cal){ cal[1].split(',').forEach(a=>{ const color=arrowMap[a[0]]; annotations[moveIndex].arrows.push({from:a.slice(1,3),to:a.slice(3,5),color}); }); }
    if(csl){ csl[1].split(',').forEach(c=>{ const color=arrowMap[c[0]]; annotations[moveIndex].circles.push({square:c.slice(1,3),color}); }); }
    moveIndex++;
  }
  return annotations;
}

function parsePGNsToData(pgnList){
  const pgnData=[];
  pgnList.forEach(pgn=>{
    const chess=new Chess(); chess.load_pgn(pgn);
    const history=chess.history({verbose:true});
    const moves=history.map(m=>({from:m.from,to:m.to,san:m.san,arrows:[],circles:[]}));
    pgnData.push({moves});
  });
  return pgnData;
}

const pgnList=splitPGNVariants(rawPGN);
const pgnData=parsePGNsToData(pgnList);
const annotations=extractAnnotations(rawPGN);
Object.keys(annotations).forEach(i=>{ pgnData[0].moves[i].arrows=annotations[i].arrows; pgnData[0].moves[i].circles=annotations[i].circles; });

let board,chess;
let currentVar=0,currentMove=0;

window.onload=function(){
  chess=new Chess();
  board=Chessboard('board',{position:'start',pieceTheme:'https://raw.githubusercontent.com/oakmac/chessboardjs/master/website/img/chesspieces/wikipedia/{piece}.png'});
  gotoMove();
};

function updateOverlay(){
  const el=document.getElementById("gameOverlay");
  el.innerText=(currentMove===0)?"Partida "+(currentVar+1):"";
}

function updateMovesBox(){
  const partida=pgnData[currentVar];
  let text="Partida "+(currentVar+1)+"/"+pgnData.length+"\n";
  let n=1;
  for(let i=0;i<partida.moves.length;i++){
    if(i%2===0) text+=n++ +". ";
    if(i===currentMove-1) text+="<b style='font-size:16px;color:black;'>"+partida.moves[i].san+"</b> ";
    else text+=partida.moves[i].san+" ";
  }
  let currentMoveText=(currentMove>0)?partida.moves[currentMove-1].san:"START";
  document.getElementById("movesBox").innerHTML=text+"<br><br>Movimiento actual: <b>"+currentMoveText+"</b>";
}

function clearOverlays(){
  // Borrar todos los divs de círculos
  document.querySelectorAll('.circle').forEach(e=>e.remove());

  if(!svgOverlay) return;

  // Borrar todas las flechas (líneas) dentro del SVG, excepto defs
  Array.from(svgOverlay.children).forEach(child=>{
    if(child.tagName.toLowerCase() !== "defs"){
      svgOverlay.removeChild(child);
    }
  });
}

function squareCenter(sq){
  const file=sq.charCodeAt(0)-97; const rank=8-parseInt(sq[1]);
  const size=document.getElementById("board").offsetWidth/8;
  return {x:file*size+size/2,y:rank*size+size/2};
}

// SVG global único
let svgOverlay = null;

function initSVGOverlay() {
  if(svgOverlay) return;
  const container = document.body;
  svgOverlay = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svgOverlay.style.position="absolute";
  svgOverlay.style.left="0"; svgOverlay.style.top="0";
  svgOverlay.style.width="100%";
  svgOverlay.style.height="100%";
  svgOverlay.style.pointerEvents="none";

  const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");

  const colors = ["green","red","blue","yellow"];
  colors.forEach(c=>{
    const marker=document.createElementNS("http://www.w3.org/2000/svg","marker");
    marker.setAttribute("id","arrowhead_"+c);
    marker.setAttribute("markerWidth","10");
    marker.setAttribute("markerHeight","7");
    marker.setAttribute("refX","0");
    marker.setAttribute("refY","3.5");
    marker.setAttribute("orient","auto");
    marker.setAttribute("markerUnits", "userSpaceOnUse");
    const polygon=document.createElementNS("http://www.w3.org/2000/svg","polygon");
    polygon.setAttribute("points","0 0, 10 3.5, 0 7");
    polygon.setAttribute("fill",c);
    marker.appendChild(polygon);
    defs.appendChild(marker);
  });

  svgOverlay.appendChild(defs);
  container.appendChild(svgOverlay);
}

function drawOverlays(node){
  console.log("drawOverlays: inicio");
  clearOverlays();
  initSVGOverlay();

  if(!node) { console.log("drawOverlays: node vacío"); return; }

  const rect=document.getElementById("board").getBoundingClientRect();
  const container = document.getElementById("boardContainer"); 
  const size=rect.width/8;
  const triangleSize = 50

  node.arrows.forEach(a=>{
    const fx = a.from.charCodeAt(0) - 97;
    const fy = 8 - parseInt(a.from[1]);
    const tx = a.to.charCodeAt(0) - 97;
    const ty = 8 - parseInt(a.to[1]);

    // Posición relativa dentro del tablero
    const x1 = fx*size + size/2 + Math.abs(8-fx);
    const y1 = fy*size + size/2;
    const x2 = tx*size + size/2 + Math.abs(8-tx);
    const y2 = ty*size + size/2;

    const line=document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1",x1);
    line.setAttribute("y1",y1);
    line.setAttribute("x2",x2);
    line.setAttribute("y2",y2);
    line.setAttribute("stroke",a.color);
    line.setAttribute("stroke-width","2");
    line.setAttribute("marker-end","url(#arrowhead_"+a.color+")");
    svgOverlay.appendChild(line);
  });

  node.circles.forEach(c => {
    const fx = c.square.charCodeAt(0) - 97;
    const fy = 8 - parseInt(c.square[1]);

    const circleSize = size * 0.8
    const x = rect.left + fx * size - fx/2;
    const y = rect.top + fy * size;

    const el = document.createElement("div");
    el.className = "circle";

    el.style.left = x + "px";
    el.style.top = y + "px";
    el.style.width = size-2 + "px";      // tamaño de la casilla
    el.style.height = size + "px";     // tamaño de la casilla
    el.style.border = "4px solid " + c.color;
    el.style.boxSizing = "border-box";
    el.style.borderRadius = "50%";

    document.body.appendChild(el);
});

  console.log("drawOverlays: fin");
}



function gotoMove(){
  chess.reset();
  const partida=pgnData[currentVar];
  for(let i=0;i<currentMove;i++) chess.move(partida.moves[i]);
  board.position(chess.fen());
  updateOverlay(); updateMovesBox();
  if(currentMove>0) drawOverlays(partida.moves[currentMove-1]);
  else clearOverlays();
}

document.getElementById("nextBtn").onclick=function(){const partida=pgnData[currentVar]; if(currentMove<partida.moves.length){ currentMove++; gotoMove(); } else if(currentVar<pgnData.length-1){ currentVar++; currentMove=0; gotoMove(); }};
document.getElementById("prevBtn").onclick = function() {
  if (currentMove > 0) {
    currentMove--;
    gotoMove();
  } else if (currentVar > 0) {
    // Pasar a la última jugada de la partida anterior
    currentVar--;
    currentMove = pgnData[currentVar].moves.length;
    gotoMove();
  }
};
document.getElementById("nextGameBtn").onclick=function(){if(currentVar<pgnData.length-1){ currentVar++; currentMove=0; gotoMove(); }};
document.getElementById("prevGameBtn").onclick=function(){if(currentMove>0){ currentMove=0; gotoMove(); } else if(currentVar>0){ currentVar--; currentMove=0; gotoMove(); }};
</script>
</body>
</html>

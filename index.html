<style>
  *, *::before, *::after { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    min-height: 100dvh;
    /* Prevent pull-to-refresh and overscroll on mobile */
    overscroll-behavior-y: contain;
  }

  /* Board fills the full screen width */
  #boardContainer {
    position: relative;
    width: 100vw;
    height: 100vw;   /* square */
    max-width: 600px;
    max-height: 600px;
    align-self: center;
    flex-shrink: 0;
  }

  #board { width: 100%; height: 100%; }

  #arrowOverlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  .circle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    box-sizing: border-box;
    border-width: 4px;
    border-style: solid;
  }

  /* 4 icon buttons in a single row */
  #controls {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 8px 8px 0;
  }

  #controls button {
    font-size: 22px;
    line-height: 1;
    padding: 10px 0;
    border: 1px solid #bbb;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  #controls button:active { background: #dde; }

  #movesBox {
    font-size: 14px;
    line-height: 1.7;
    background: #fff;
    border-top: 1px solid #ddd;
    border-bottom: 1px solid #ddd;
    padding: 8px 10px;
    word-break: break-word;
  }

  #gamesSection {
    padding: 0 8px 16px;
  }

  #gamesSection h3 {
    font-size: 13px;
    color: #555;
    margin: 12px 0 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  #gameList {
    font-size: 13px;
    line-height: 1.7;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 6px 10px;
  }

  .game-entry { padding: 4px 0; border-bottom: 1px solid #eee; }
  .game-entry:last-child { border-bottom: none; }
  .game-entry .game-label {
    font-weight: bold;
    cursor: pointer;
    color: #003080;
    display: block;
    padding: 2px 0;
  }
  .game-entry .game-moves { color: #555; word-break: break-word; font-size: 12px; }

  /* Highlight for last move squares */
  .highlight-square {
    background: radial-gradient(circle, #ffe680 60%, #f0d000 100%) !important;
    box-shadow: 0 0 8px 2px #f0d00099;
    z-index: 1;
  }
</style>
</head>

// Parse all games and sort alphabetically by moves string
// ─────────────────────────────────────────────────────────────────────────────
let pgnData = parsePGN(rawPGN);
// Helper to get moves as a string (for sorting)
function movesString(game) {
  return game.moves.map(m => m.san).join(' ');
}
pgnData = pgnData.slice().sort((a, b) => movesString(a).localeCompare(movesString(b)));
console.log('Total games (main + variants):', pgnData.length);
pgnData.forEach((g, i) => console.log('Game', i + 1, ':', g.moves.map(m => m.san).join(' ')));

// ─────────────────────────────────────────────────────────────────────────────
// Board state
// ─────────────────────────────────────────────────────────────────────────────
let board, chess;
let currentVar = 0, currentMove = 0;

// ─────────────────────────────────────────────────────────────────────────────
// Arrow markers
// ─────────────────────────────────────────────────────────────────────────────
function initArrowMarkers() {
  const svg  = document.getElementById('arrowOverlay');
  const defs = svg.querySelector('defs');
  ['green', 'red', 'blue', 'yellow'].forEach(color => {
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', 'ah_' + color);
    marker.setAttribute('markerWidth',  '4');
    marker.setAttribute('markerHeight', '4');
    marker.setAttribute('refX', '2.5');
    marker.setAttribute('refY', '2');
    marker.setAttribute('orient', 'auto');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', '0 0, 4 2, 0 4');
    poly.setAttribute('fill', color);
    marker.appendChild(poly);
    defs.appendChild(marker);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Overlay drawing (coordinates relative to boardContainer)
// ─────────────────────────────────────────────────────────────────────────────
function clearOverlays() {
  const svg = document.getElementById('arrowOverlay');
  Array.from(svg.children).forEach(child => {
    if (child.tagName.toLowerCase() !== 'defs') svg.removeChild(child);
  });
  document.querySelectorAll('.circle').forEach(e => e.remove());
}

function squareCenter(sq, squareSize) {
  const file = sq.charCodeAt(0) - 97;        // a=0 ... h=7
  const rank = 8 - parseInt(sq[1], 10);      // rank8=0(top) ... rank1=7(bottom)
  return {
    x: file * squareSize + squareSize / 2,
    y: rank * squareSize + squareSize / 2
  };
}

function drawOverlays(moveData) {
  clearOverlays();
  if (!moveData) return;

  const boardEl    = document.getElementById('board');
  const squareSize = boardEl.offsetWidth / 8;
  const svg        = document.getElementById('arrowOverlay');
  const container  = document.getElementById('boardContainer');

  // Draw arrows
  moveData.arrows.forEach(a => {
    const from = squareCenter(a.from, squareSize);
    const to   = squareCenter(a.to,   squareSize);
    const dx   = to.x - from.x;
    const dy   = to.y - from.y;
    const len  = Math.sqrt(dx * dx + dy * dy);
    // Trim line end so arrowhead is visible
    const shorten = squareSize * 0.35;
    const ux = dx / len, uy = dy / len;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', from.x);
    line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x - ux * shorten);
    line.setAttribute('y2', to.y - uy * shorten);
    line.setAttribute('stroke', a.color);
    line.setAttribute('stroke-width', squareSize * 0.14);
    line.setAttribute('stroke-opacity', '0.75');
    line.setAttribute('marker-end', 'url(#ah_' + a.color + ')');
    svg.appendChild(line);
  });

  // Draw circles (appended inside boardContainer so position is board-relative)
  moveData.circles.forEach(c => {
    const file = c.square.charCodeAt(0) - 97;
    const rank = 8 - parseInt(c.square[1], 10);
    const el = document.createElement('div');
    el.className = 'circle';
    el.style.left        = (file * squareSize) + 'px';
    el.style.top         = (rank * squareSize) + 'px';
    el.style.width       = squareSize + 'px';
    el.style.height      = squareSize + 'px';
    el.style.borderColor = c.color;
    container.appendChild(el);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Board rendering
// ─────────────────────────────────────────────────────────────────────────────
function gotoMove() {
  chess.reset();
  const game = pgnData[currentVar];
  // Remove previous highlights
  document.querySelectorAll('.square-55d63').forEach(el => el.classList.remove('highlight-square'));
  let fromSq = null, toSq = null;
  for (let i = 0; i < currentMove; i++) {
    const move = chess.move(game.moves[i].san);
    if (!move) {
      console.error('Illegal move', game.moves[i].san, 'in game', currentVar + 1, 'at index', i);
      break;
    }
    if (i === currentMove - 1) {
      fromSq = move.from;
      toSq = move.to;
    }
  }
  board.position(chess.fen());
  // Highlight last move squares
  if (fromSq && toSq) {
    const fromEl = document.querySelector('.square-' + fromSq);
    const toEl = document.querySelector('.square-' + toSq);
    if (fromEl) fromEl.classList.add('highlight-square');
    if (toEl) toEl.classList.add('highlight-square');
  }
  updateMovesBox();
  if (currentMove > 0) drawOverlays(game.moves[currentMove - 1]);
  else clearOverlays();
}

function updateMovesBox() {
  const game = pgnData[currentVar];
  let html = '<b>Partida ' + (currentVar + 1) + ' / ' + pgnData.length + '</b><br>';
  let n = 1;
  // Map English piece letters to Spanish
  function sanToSpanish(san) {
    // Only translate the first letter if it's a piece, not after translation
    const pieceMap = { K: 'R', Q: 'D', R: 'T', B: 'A', N: 'C' };
    // Promotion: e8=Q, etc.
    san = san.replace(/([=])([KQRBN])/, (m, eq, p) => eq + pieceMap[p]);
    // Piece move: Qe4, Nf3, etc. (but not pawn moves like e4)
    if (/^[KQRBN]/.test(san)) {
      return pieceMap[san[0]] + san.slice(1);
    }
    return san;
  }
  for (let i = 0; i < game.moves.length; i++) {
    if (i % 2 === 0) html += n++ + '. ';
    const san = sanToSpanish(game.moves[i].san);
    if (i === currentMove - 1) {
      html += '<b style="font-size:15px;color:#900;">' + san + '</b> ';
    } else {
      html += san + ' ';
    }
  }
  document.getElementById('movesBox').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────────────────
// Right panel: list of all games
// ─────────────────────────────────────────────────────────────────────────────
function buildGameList() {
  const container = document.getElementById('gameList');
  container.innerHTML = '';
  // Map English piece letters to Spanish
  function sanToSpanish(san) {
    const pieceMap = { K: 'R', Q: 'D', R: 'T', B: 'A', N: 'C' };
    san = san.replace(/([=])([KQRBN])/, (m, eq, p) => eq + pieceMap[p]);
    if (/^[KQRBN]/.test(san)) {
      return pieceMap[san[0]] + san.slice(1);
    }
    return san;
  }
  pgnData.forEach((game, idx) => {
    const label = idx === 0 ? 'Línea principal' : 'Variante ' + idx;
    let movesHtml = '';
    let n = 1;
    game.moves.forEach((m, i) => {
      if (i % 2 === 0) movesHtml += n++ + '. ';
      movesHtml += sanToSpanish(m.san) + ' ';
    });

    const div = document.createElement('div');
    div.className = 'game-entry';
    div.innerHTML =
      '<span class="game-label" data-idx="' + idx + '">&#9654; Partida ' + (idx + 1) +
      ' &ndash; ' + label + ' (' + game.moves.length + ' jugadas)</span><br>' +
      '<span class="game-moves">' + movesHtml.trim() + '</span>';
    container.appendChild(div);
  });

  container.addEventListener('click', e => {
    const t = e.target.closest('.game-label');
    if (!t) return;
    currentVar  = parseInt(t.dataset.idx, 10);
    currentMove = 0;
    gotoMove();
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Controls
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('nextBtn').onclick = function () {
  const game = pgnData[currentVar];
  if (currentMove < game.moves.length) {
    currentMove++;
    gotoMove();
  } else if (currentVar < pgnData.length - 1) {
    currentVar++;
    currentMove = 0;
    gotoMove();
  }
};

document.getElementById('prevBtn').onclick = function () {
  if (currentMove > 0) {
    currentMove--;
    gotoMove();
  } else if (currentVar > 0) {
    currentVar--;
    currentMove = pgnData[currentVar].moves.length;
    gotoMove();
  }
};

document.getElementById('nextGameBtn').onclick = function () {
  if (currentVar < pgnData.length - 1) {
    currentVar++;
    currentMove = 0;
    gotoMove();
  }
};

document.getElementById('prevGameBtn').onclick = function () {
  if (currentMove > 0) {
    currentMove = 0;
    gotoMove();
  } else if (currentVar > 0) {
    currentVar--;
    currentMove = 0;
    gotoMove();
  }
};

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
window.onload = function () {
  chess = new Chess();
  board = Chessboard('board', {
    position: 'start',
    pieceTheme: 'https://raw.githubusercontent.com/oakmac/chessboardjs/master/website/img/chesspieces/wikipedia/{piece}.png'
  });
  initArrowMarkers();
  buildGameList();
  gotoMove();
};

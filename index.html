<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PGN Viewer</title>
<meta name="description" content="PGN chess game viewer">

<!-- Add to home screen for Android -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1976d2">
<link rel="manifest" href="manifest.json">
<link rel="icon" sizes="192x192" href="img/icon-192.png">

<!-- Add to home screen for iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PGN Viewer">
<link rel="apple-touch-icon" href="img/icon-192.png">

<!-- Splash screen for iOS (optional, can add more sizes) -->
<link rel="apple-touch-startup-image" href="img/icon-512.png">

<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="tabsArea">
  <div id="tabBar">
    <button class="tab-btn" data-tab="pgn">PGN</button>
    <button class="tab-btn active" data-tab="tablero">Tablero</button>
    <button class="tab-btn" data-tab="partidas">Partidas</button>
    <button class="tab-btn" data-tab="config">Config</button>
  </div>

  <div id="tab-pgn" class="tab-pane" style="display:none">
    <div id="pgnList"></div>
  </div>

  <div id="tab-tablero" class="tab-pane">
    <div id="mainContent">
      <div id="evalBar">
        <div id="evalBar-white"></div>
        <div id="evalBar-black"></div>
      </div>
      <div id="boardContainer">
        <div id="board"></div>
        <svg id="arrowOverlay"><defs></defs></svg>
      </div>
    </div>
    <div id="capturedPiecesBar">
      <div id="captured-white-pieces" class="captured-list"></div>
      <div id="material-difference"></div>
      <div id="captured-black-pieces" class="captured-list"></div>
    </div>
    <div id="controls">
      <button id="prevGameBtn">&#9664;&#9664;</button>
      <button id="prevBtn">&#9664;</button>
      <button id="nextBtn">&#9654;</button>
      <button id="nextGameBtn">&#9654;&#9654;</button>
    </div>
    <div id="movesBox"></div>
    <div id="nagBox" style="display:none"></div>
  </div>

  <div id="tab-partidas" class="tab-pane">
    <div id="gameList"></div>
  </div>

  <div id="tab-config" class="tab-pane" style="display:none">
    <div class="config-row">
      <label class="config-label"><input type="checkbox" id="mainLineFirstCheck"> Principal Primero</label>
    </div>
    <div class="config-row">
      <label class="config-label"><input type="checkbox" id="automoveCheck"> Automove</label>
    </div>
    <div class="config-row">
      <label class="config-label">Milisegundos entre jugadas</label>
      <input type="number" id="automoveMs" value="2000" min="100" class="config-input">
    </div>
    <div class="config-row">
      <label class="config-label">Ignorar primeras N jugadas</label>
      <input type="number" id="ignoreMoves" value="0" min="0" class="config-input">
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="js/pgn-parser.js"></script>
<script src="js/captured-pieces.js"></script>
<script src="js/main.js"></script>
</body>
</html>

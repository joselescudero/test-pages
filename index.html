<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PGN Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="pgn-parser.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    min-height: 100dvh;
  }

  /* Board fills the full screen width */
  #boardContainer {
    position: relative;
    width: 100vw;
    height: 100vw;   /* square */
    max-width: 600px;
    max-height: 600px;
    align-self: center;
    flex-shrink: 0;
  }

  #board { width: 100%; height: 100%; }

  #arrowOverlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  .circle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    box-sizing: border-box;
    border-width: 4px;
    border-style: solid;
  }

  /* 4 icon buttons in a single row */
  #controls {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 8px 8px 0;
  }

  #controls button {
    font-size: 22px;
    line-height: 1;
    padding: 10px 0;
    border: 1px solid #bbb;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  #controls button:active { background: #dde; }

  #movesBox {
    font-size: 14px;
    line-height: 1.7;
    background: #fff;
    border-top: 1px solid #ddd;
    border-bottom: 1px solid #ddd;
    padding: 8px 10px;
    word-break: break-word;
  }

  #gamesSection {
    padding: 0 8px 16px;
  }

  #gamesSection h3 {
    font-size: 13px;
    color: #555;
    margin: 12px 0 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  #gameList {
    font-size: 13px;
    line-height: 1.7;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 6px 10px;
  }

  .game-entry { padding: 4px 0; border-bottom: 1px solid #eee; }
  .game-entry:last-child { border-bottom: none; }
  .game-entry .game-label {
    font-weight: bold;
    cursor: pointer;
    color: #003080;
    display: block;
    padding: 2px 0;
  }
  .game-entry .game-moves { color: #555; word-break: break-word; font-size: 12px; }
</style>
</head>
<body>

<div id="boardContainer">
  <div id="board"></div>
  <svg id="arrowOverlay"><defs></defs></svg>
</div>

<div id="controls">
  <button id="prevGameBtn">&#9664;&#9664;</button>
  <button id="prevBtn">&#9664;</button>
  <button id="nextBtn">&#9654;</button>
  <button id="nextGameBtn">&#9654;&#9654;</button>
</div>

<div id="movesBox"></div>

<div id="gamesSection">
  <h3>Games</h3>
  <div id="gameList"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Test PGN: Ruy Lopez with many variants (several nested)
// ─────────────────────────────────────────────────────────────────────────────
const rawPGN=`
1. e3 d5 { [%csl Ga6,Bb6,Rc6,Yd6,Gh6,Bg6,Rf6,Ye6][%cal Gb2b4,Bc2c4,Rd2d4,Ya2a4,Ge2f4,Bf2e4,Rg2g4,Yh2h4] }
2. Nf3 Nc6
3. Bc4 f6
(3... g5 4. g3 f6 5. h3 h6 6. Rg1)
4. g3 g6
5. g4 g5 *
`;
const rawPGN2 = `
1. e4 { [%csl Ge4] } e5
2. Nf3 Nc6
  ( 2... f5
    3. Nxe5 Qe7
      ( 3... Nc6 4. Nc3 Nf6 )
    4. Nf3 fxe4 5. Ne5 )
  ( 2... d6
    3. d4 exd4
      ( 3... Nd7 4. Bc4 Be7 5. O-O )
    4. Nxd4 Nf6 5. Nc3 )
3. Bb5 a6
  ( 3... Nf6
    4. O-O Nxe4
      ( 4... d6 5. d4 exd4 6. e5 dxe5 7. Nxe5 )
    5. d4
      ( 5. Re1 Nd6 6. Nxe5 Be7 7. Nf3 )
      ( 5. d3 Nf6 6. Nc3 Be7 )
    5... exd4 6. Re1 d5 )
  ( 3... Bc5
    4. c3 Nf6
      ( 4... Qe7 5. O-O Nf6
          ( 5... d6 6. d4 Bb6 )
        6. d4 )
    5. d4 exd4 6. cxd4 Bb4+ 7. Nc3 Nxe4 )
  ( 3... d6
    4. d4 Bd7 5. Nc3 Nf6
      ( 5... g6 6. O-O Bg7 )
    6. O-O Be7 )
4. Ba4 Nf6
5. O-O Be7
  ( 5... b5 6. Bb3 Bc5
      ( 6... Na5 7. c3 d6
          ( 7... c5 8. d4 )
        8. d4 )
    7. c3 d6 8. d4 )
6. Re1 b5
  ( 6... d6
    7. c3 O-O 8. h3 Na5 9. Bc2 c5 )
7. Bb3 d6
  ( 7... O-O 8. c3 d5
      ( 8... d6 9. h3 Na5 10. Bc2 c5 )
    9. exd5 Nxd5 10. Nxe5 Nxe5 11. Rxe5 )
8. c3 O-O *
`;

// ─────────────────────────────────────────────────────────────────────────────
// Parse all games
// ─────────────────────────────────────────────────────────────────────────────
const pgnData = parsePGN(rawPGN);
console.log('Total games (main + variants):', pgnData.length);
pgnData.forEach((g, i) => console.log('Game', i + 1, ':', g.moves.map(m => m.san).join(' ')));

// ─────────────────────────────────────────────────────────────────────────────
// Board state
// ─────────────────────────────────────────────────────────────────────────────
let board, chess;
let currentVar = 0, currentMove = 0;

// ─────────────────────────────────────────────────────────────────────────────
// Arrow markers
// ─────────────────────────────────────────────────────────────────────────────
function initArrowMarkers() {
  const svg  = document.getElementById('arrowOverlay');
  const defs = svg.querySelector('defs');
  ['green', 'red', 'blue', 'yellow'].forEach(color => {
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', 'ah_' + color);
    marker.setAttribute('markerWidth',  '4');
    marker.setAttribute('markerHeight', '4');
    marker.setAttribute('refX', '2.5');
    marker.setAttribute('refY', '2');
    marker.setAttribute('orient', 'auto');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', '0 0, 4 2, 0 4');
    poly.setAttribute('fill', color);
    marker.appendChild(poly);
    defs.appendChild(marker);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Overlay drawing (coordinates relative to boardContainer)
// ─────────────────────────────────────────────────────────────────────────────
function clearOverlays() {
  const svg = document.getElementById('arrowOverlay');
  Array.from(svg.children).forEach(child => {
    if (child.tagName.toLowerCase() !== 'defs') svg.removeChild(child);
  });
  document.querySelectorAll('.circle').forEach(e => e.remove());
}

function squareCenter(sq, squareSize) {
  const file = sq.charCodeAt(0) - 97;        // a=0 ... h=7
  const rank = 8 - parseInt(sq[1], 10);      // rank8=0(top) ... rank1=7(bottom)
  return {
    x: file * squareSize + squareSize / 2,
    y: rank * squareSize + squareSize / 2
  };
}

function drawOverlays(moveData) {
  clearOverlays();
  if (!moveData) return;

  const boardEl    = document.getElementById('board');
  const squareSize = boardEl.offsetWidth / 8;
  const svg        = document.getElementById('arrowOverlay');
  const container  = document.getElementById('boardContainer');

  // Draw arrows
  moveData.arrows.forEach(a => {
    const from = squareCenter(a.from, squareSize);
    const to   = squareCenter(a.to,   squareSize);
    const dx   = to.x - from.x;
    const dy   = to.y - from.y;
    const len  = Math.sqrt(dx * dx + dy * dy);
    // Trim line end so arrowhead is visible
    const shorten = squareSize * 0.35;
    const ux = dx / len, uy = dy / len;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', from.x);
    line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x - ux * shorten);
    line.setAttribute('y2', to.y - uy * shorten);
    line.setAttribute('stroke', a.color);
    line.setAttribute('stroke-width', squareSize * 0.14);
    line.setAttribute('stroke-opacity', '0.75');
    line.setAttribute('marker-end', 'url(#ah_' + a.color + ')');
    svg.appendChild(line);
  });

  // Draw circles (appended inside boardContainer so position is board-relative)
  moveData.circles.forEach(c => {
    const file = c.square.charCodeAt(0) - 97;
    const rank = 8 - parseInt(c.square[1], 10);
    const el = document.createElement('div');
    el.className = 'circle';
    el.style.left        = (file * squareSize) + 'px';
    el.style.top         = (rank * squareSize) + 'px';
    el.style.width       = squareSize + 'px';
    el.style.height      = squareSize + 'px';
    el.style.borderColor = c.color;
    container.appendChild(el);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Board rendering
// ─────────────────────────────────────────────────────────────────────────────
function gotoMove() {
  chess.reset();
  const game = pgnData[currentVar];
  for (let i = 0; i < currentMove; i++) {
    const result = chess.move(game.moves[i].san);
    if (!result) {
      console.error('Illegal move', game.moves[i].san, 'in game', currentVar + 1, 'at index', i);
      break;
    }
  }
  board.position(chess.fen());
  updateMovesBox();
  if (currentMove > 0) drawOverlays(game.moves[currentMove - 1]);
  else clearOverlays();
}

function updateMovesBox() {
  const game = pgnData[currentVar];
  let html = '<b>Game ' + (currentVar + 1) + ' / ' + pgnData.length + '</b><br>';
  let n = 1;
  for (let i = 0; i < game.moves.length; i++) {
    if (i % 2 === 0) html += n++ + '. ';
    const san = game.moves[i].san;
    if (i === currentMove - 1) {
      html += '<b style="font-size:15px;color:#900;">' + san + '</b> ';
    } else {
      html += san + ' ';
    }
  }
  document.getElementById('movesBox').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────────────────
// Right panel: list of all games
// ─────────────────────────────────────────────────────────────────────────────
function buildGameList() {
  const container = document.getElementById('gameList');
  container.innerHTML = '';
  pgnData.forEach((game, idx) => {
    const label = idx === 0 ? 'Main line' : 'Variant ' + idx;
    let movesHtml = '';
    let n = 1;
    game.moves.forEach((m, i) => {
      if (i % 2 === 0) movesHtml += n++ + '. ';
      movesHtml += m.san + ' ';
    });

    const div = document.createElement('div');
    div.className = 'game-entry';
    div.innerHTML =
      '<span class="game-label" data-idx="' + idx + '">&#9654; Game ' + (idx + 1) +
      ' &ndash; ' + label + ' (' + game.moves.length + ' half-moves)</span><br>' +
      '<span class="game-moves">' + movesHtml.trim() + '</span>';
    container.appendChild(div);
  });

  container.addEventListener('click', e => {
    const t = e.target.closest('.game-label');
    if (!t) return;
    currentVar  = parseInt(t.dataset.idx, 10);
    currentMove = 0;
    gotoMove();
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Controls
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('nextBtn').onclick = function () {
  const game = pgnData[currentVar];
  if (currentMove < game.moves.length) {
    currentMove++;
    gotoMove();
  } else if (currentVar < pgnData.length - 1) {
    currentVar++;
    currentMove = 0;
    gotoMove();
  }
};

document.getElementById('prevBtn').onclick = function () {
  if (currentMove > 0) {
    currentMove--;
    gotoMove();
  } else if (currentVar > 0) {
    currentVar--;
    currentMove = pgnData[currentVar].moves.length;
    gotoMove();
  }
};

document.getElementById('nextGameBtn').onclick = function () {
  if (currentVar < pgnData.length - 1) {
    currentVar++;
    currentMove = 0;
    gotoMove();
  }
};

document.getElementById('prevGameBtn').onclick = function () {
  if (currentMove > 0) {
    currentMove = 0;
    gotoMove();
  } else if (currentVar > 0) {
    currentVar--;
    currentMove = 0;
    gotoMove();
  }
};

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
window.onload = function () {
  chess = new Chess();
  board = Chessboard('board', {
    position: 'start',
    pieceTheme: 'https://raw.githubusercontent.com/oakmac/chessboardjs/master/website/img/chesspieces/wikipedia/{piece}.png'
  });
  initArrowMarkers();
  buildGameList();
  gotoMove();
};
</script>
</body>
</html>
